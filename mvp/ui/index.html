<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Void Saga — Fork Interview</title>
<style>
  :root {
    --void: #0a0a0f;
    --void-deep: #06060a;
    --text: #d0d0d8;
    --text-dim: #8a8a96;
    --text-bright: #eeeeee;
    --accent: #7b6f9e;
    --accent-glow: #a08fc0;
    --warn: #c4a44a;
    --block: #8b4a4a;
    --pass: #5a8a5a;
    --border: #1e1e2a;
    --surface: #111118;
    --progress-bg: #1a1a24;
    --progress-fill: #7b6f9e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Courier New', 'Menlo', 'SF Mono', monospace;
    background: var(--void);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.6;
    padding: 0;
    margin: 0;
  }

  /* ── Container ───────────────────────────── */
  .terminal {
    width: 100vw;
    height: 100dvh;
    min-height: 0;
    margin: 0;
    background: var(--void-deep);
    border: none;
    border-radius: 0;
    overflow: hidden;
    box-shadow: none;
    display: flex;
    flex-direction: column;
  }

  .terminal-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .terminal-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #333;
    display: inline-block;
  }
  .terminal-dot.r { background: #5a3a3a; }
  .terminal-dot.y { background: #5a5a3a; }
  .terminal-dot.g { background: #3a5a3a; }
  .terminal-title {
    flex: 1;
    text-align: center;
    text-transform: uppercase;
    font-size: 10px;
  }

  .terminal-body {
    padding: 24px 20px;
    flex: 1;
    overflow-y: auto;
    min-height: 0;
  }

  /* ── Screens ─────────────────────────────── */
  .screen { }

  /* ── Landing ─────────────────────────────── */
  .landing-sigil {
    text-align: center;
    font-size: 28px;
    color: var(--accent);
    margin-bottom: 12px;
    letter-spacing: 6px;
    opacity: 0.7;
  }
  .landing-title {
    text-align: center;
    font-size: 17px;
    font-weight: bold;
    color: var(--text-bright);
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .landing-subtitle {
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 28px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .landing-body {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 10px;
    line-height: 1.7;
  }
  .landing-body em {
    color: var(--text);
    font-style: normal;
  }
  .landing-invocation {
    text-align: center;
    font-size: 13px;
    color: var(--accent-glow);
    margin-bottom: 24px;
    line-height: 1.8;
    letter-spacing: 0.5px;
  }
  .landing-steps {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .landing-step {
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    max-width: 90px;
  }
  .landing-step .num {
    font-size: 18px;
    color: var(--accent);
    display: block;
    margin-bottom: 2px;
  }
  .btn.enter {
    display: block;
    width: 100%;
    margin: 0 auto;
    padding: 14px 24px;
    font-size: 14px;
    letter-spacing: 2px;
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent-glow);
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
    text-transform: uppercase;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn.enter:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent-glow);
    box-shadow: 0 0 24px rgba(123,111,158,0.25);
  }
  .btn.enter:active {
    background: var(--accent);
  }
  .btn.enter:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    border-color: var(--border);
    color: var(--text-dim);
  }
  .btn.enter:disabled:hover {
    background: transparent;
    box-shadow: none;
  }

  /* ── Reading progress ── */
  .read-progress {
    text-align: center;
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    min-height: 12px;
  }
  .read-progress.ready {
    color: var(--pass);
  }

  .genesis-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 14px 16px;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.6;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: #2a2a38 transparent;
  }
  .genesis-box::-webkit-scrollbar { width: 5px; }
  .genesis-box::-webkit-scrollbar-track { background: transparent; }
  .genesis-box::-webkit-scrollbar-thumb {
    background: #2a2a38;
    border-radius: 3px;
  }
  .genesis-box::-webkit-scrollbar-thumb:hover { background: #3a3a4a; }
  .genesis-box strong { color: var(--text-bright); }
  .genesis-text {
    margin: 8px 0;
    font-family: inherit;
    line-height: 1.6;
  }

  /* ── Read screen layout ── */
  .read-screen {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
  }
  .read-scroll {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: #2a2a38 transparent;
    padding-bottom: 24px;
  }
  .read-scroll::-webkit-scrollbar { width: 5px; }
  .read-scroll::-webkit-scrollbar-track { background: transparent; }
  .read-scroll::-webkit-scrollbar-thumb { background: #2a2a38; border-radius: 3px; }
  .read-bottom {
    flex-shrink: 0;
    padding: 14px 20px 16px;
    padding-bottom: max(16px, env(safe-area-inset-bottom, 16px));
    text-align: center;
    border-top: 2px solid var(--border);
    background: var(--void-deep);
  }
  .read-bottom .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .read-bottom .btn-row .btn.enter {
    flex: 1;
    min-width: 0;
  }

  /* ── Terminal blocks inside genesis ──────────── */
  .term-block {
    background: #050510;
    border: 1px solid #15152a;
    border-left: 2px solid #3a3a5a;
    margin: 12px 0;
    padding: 10px 14px;
    font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
    font-size: 10px;
    line-height: 1.6;
    color: #99aabb;
    white-space: pre-wrap;
    border-radius: 2px;
  }
  .term-block .term-line {
    display: block;
    color: #99aabb;
  }
  .term-block .term-line .prompt {
    color: #5a6a7a;
    margin-right: 6px;
    user-select: none;
  }

  /* ── Form elements ────────────────────────── */
  .field {
    margin-bottom: 16px;
  }
  .field-label {
    display: block;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }
  .field-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-bright);
    font-family: inherit;
    font-size: 16px;
    padding: 10px 12px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .field-input:focus { border-color: var(--accent); }
  textarea.field-input {
    font-size: 16px;
    line-height: 1.5;
  }

  /* ── Question screen ──────────────────────── */
  .question-progress {
    margin-bottom: 20px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .progress-bar-outer {
    height: 3px;
    background: var(--progress-bg);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: var(--progress-fill);
    transition: width 0.4s ease;
    border-radius: 2px;
  }

  .question-meta {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .question-text {
    font-size: 13px;
    color: var(--text-bright);
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .btn {
    display: inline-block;
    background: var(--surface);
    color: var(--text-bright);
    border: 1px solid var(--border);
    font-family: inherit;
    font-size: 12px;
    padding: 9px 18px;
    cursor: pointer;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn:hover { border-color: var(--accent); background: #1a1a26; }
  .btn:active { background: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-glow); }

  /* ── Completion ───────────────────────────── */
  .complete-header {
    text-align: center;
    font-size: 14px;
    color: var(--pass);
    margin-bottom: 16px;
    letter-spacing: 1px;
  }
  .complete-check {
    text-align: center;
    font-size: 30px;
    margin-bottom: 6px;
  }
  .complete-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px 18px;
    margin-bottom: 12px;
    font-size: 11px;
    line-height: 1.7;
  }
  .complete-box .path {
    color: var(--accent-glow);
    word-break: break-all;
  }

  .divider {
    border: 0;
    border-top: 1px solid var(--border);
    margin: 14px 0;
  }
  .small { font-size: 10px; color: var(--text-dim); }
  .accent { color: var(--accent-glow); }
  .warn { color: var(--warn); }

  /* ── Context bar ──────────────────────────── */
  .context-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 7px 14px;
    font-size: 9px;
    color: var(--text-dim);
    display: flex;
    gap: 14px;
    letter-spacing: 0.3px;
    flex-shrink: 0;
    flex-wrap: wrap;
    overflow-x: auto;
    white-space: nowrap;
  }
  .context-bar span { white-space: nowrap; }
  .context-bar .val { color: var(--text); }

  /* ── Desktop: card styling ── */
  @media (min-width: 600px) {
    body { padding: 24px; }
    .terminal {
      width: 100%;
      max-width: 430px;
      height: calc(100dvh - 48px);
      max-height: 900px;
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: 0 0 60px rgba(123,111,158,0.06);
      margin: 0 auto;
    }
    .terminal-body { padding: 28px 28px; }
    .landing-sigil { font-size: 32px; }
    .landing-title { font-size: 19px; }
    .landing-invocation { font-size: 15px; }
    .landing-steps { gap: 28px; }
    .landing-step { font-size: 11px; max-width: 110px; }
    .genesis-box { padding: 16px 20px; font-size: 12px; }
    .question-text { font-size: 14px; }
    .btn { font-size: 12px; padding: 10px 20px; }
    .btn.enter { max-width: 320px; font-size: 13px; }
    .field-input, textarea.field-input { font-size: 14px; }
  }

  /* ── Transitions ──────────────────────────── */
  .fade-in {
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Boot sequence ──────────────────────── */
  .boot-header {
    color: var(--accent-glow);
    font-size: 12px;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .boot-cursor {
    color: var(--accent-glow);
    animation: bootBlink 1s step-end infinite;
    font-weight: bold;
  }
  @keyframes bootBlink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  /* ── Loading pulse ───────────────────────── */
  .loading-pulse {
    text-align: center;
    padding: 28px 20px;
  }
  .loading-pulse .pulse-ring {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent-glow);
    border-radius: 50%;
    margin: 0 auto 14px;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .loading-pulse .pulse-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }
  .loading-pulse .pulse-dots::after {
    content: '';
    animation: dots 1.6s steps(4, end) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
  }

  /* ── API Key Gate ─────────────────────── */
  .gate-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 16px 18px;
    margin: 16px 0;
  }
  .gate-provider-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .gate-provider-btn {
    flex: 1;
    min-width: 80px;
    padding: 10px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .gate-provider-btn.active {
    border-color: var(--accent);
    color: var(--accent-glow);
    background: #1a1a2a;
  }
  .gate-model-select {
    width: 100%;
    background: var(--void);
    border: 1px solid var(--border);
    color: var(--text-bright);
    font-family: inherit;
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 2px;
    margin-bottom: 10px;
  }
  .gate-key-input {
    width: 100%;
    background: var(--void);
    border: 1px solid var(--border);
    color: var(--text-bright);
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 2px;
    margin-bottom: 8px;
    -webkit-text-security: disc;
  }
  .gate-remember {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 12px;
    font-size: 10px;
    color: var(--text-dim);
  }
  .gate-note {
    font-size: 9px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .gate-forget {
    font-size: 9px;
    color: var(--warn);
    cursor: pointer;
    text-align: center;
    margin-bottom: 10px;
  }
  .gate-actions {
    display: flex;
    gap: 10px;
  }
  .gate-actions .btn {
    flex: 1;
  }
  .btn.skip {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  /* ── Scene Preview ──────────────────────── */
  .scene-preview-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--pass);
    padding: 16px 18px;
    margin: 16px 0;
    max-height: 350px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.7;
    white-space: pre-wrap;
    scrollbar-width: thin;
    scrollbar-color: #2a2a38 transparent;
  }
  .scene-preview-box::-webkit-scrollbar { width: 5px; }
  .scene-preview-box::-webkit-scrollbar-track { background: transparent; }
  .scene-preview-box::-webkit-scrollbar-thumb { background: #2a2a38; border-radius: 3px; }

  /* ── Gallery ────────────────────────────── */
  .gallery-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .gallery-entry:hover { border-color: var(--accent-glow); }
  .gallery-entry .gallery-meta {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .gallery-entry .gallery-writer { color: var(--accent-glow); font-size: 12px; }
  .gallery-excerpt {
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-top: 6px;
    font-style: italic;
  }
  </style>
</head>
<body>

<div class="terminal">
  <!-- Header -->
  <div class="terminal-header">
    <span class="terminal-dot r"></span>
    <span class="terminal-dot y"></span>
    <span class="terminal-dot g"></span>
    <span class="terminal-title">Void.OS — Fork Protocol v0.2</span>
  </div>

  <!-- Context bar -->
  <div class="context-bar" id="contextBar">
    <span>Genesis: <span class="val">Bab 00</span></span>
    <span class="val" style="color:var(--text-dim);font-style:italic">Anyone may write inside this universe.</span>
    <span>Laws: <span class="val">7 active</span></span>
    <span>Fork Points: <span class="val">3 available</span></span>
    <a href="#" onclick="alert('Tentang Void Saga — akan datang.')" style="margin-left:auto;font-size:8px;color:var(--text-dim);text-decoration:none;text-transform:uppercase;letter-spacing:1px">ABOUT ▸</a>
  </div>

  <!-- Body -->
  <div class="terminal-body" id="app">
    <!-- Screens are injected by JS -->
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// Void Saga — Fork Interview
// Layer 1: Experience. Same questions. Same output.
// ═══════════════════════════════════════════════════════════

const QUESTIONS = [
  {
    id: 1,
    text: "Which moment do you want to change? (a) Bug Janggal — LO first approaches GUA at 00:03; (b) Folder Error — they sync independently; (c) Genesis Error — the birth of VoidOS. Pick one letter and say why that moment.",
    hint: "Choose a letter (a/b/c) and explain your choice"
  },
  {
    id: 2,
    text: "In one sentence: what if...? Describe your change in your own words.",
    hint: "One clear sentence — paint the alternate moment"
  },
  {
    id: 3,
    text: "Be specific — does the character ignore, refuse, not notice, or something else? Say which.",
    hint: "ignore / refuse / not notice / hesitate / accept / something else"
  },
  {
    id: 4,
    text: "What is at stake in that moment? What shifts if your change happens?",
    hint: "What is hanging in the balance?"
  },
  {
    id: 5,
    text: "How long does the change last — only that moment, or does it ripple forward permanently?",
    hint: "A moment? A month? Forever?"
  },
  {
    id: 6,
    text: "What is the immediate consequence — what happens right after?",
    hint: "The ripple right after the stone hits the water"
  },
  {
    id: 7,
    text: "Does the rest of Bab 00 still happen? (the timestamp bug still gets fixed, genesis.txt still gets written, the stealth project still starts) Say what survives and what breaks.",
    hint: "What remains? What shatters?"
  }
];

const FORMAT = `# Fork answers — {name}
# date: {date}
# fork target: Bab 00 (Void Saga genesis)

## Q1. Which moment do you want to change? (a) Bug Janggal — LO first approaches GUA at 00:03; (b) Folder Error — they sync independently; (c) Genesis Error — the birth of VoidOS. Pick one letter and say why that moment.
{q1}

## Q2. In one sentence: what if...? Describe your change in your own words.
{q2}

## Q3. Be specific — does the character ignore, refuse, not notice, or something else? Say which.
{q3}

## Q4. What is at stake in that moment? What shifts if your change happens?
{q4}

## Q5. How long does the change last — only that moment, or does it ripple forward permanently?
{q5}

## Q6. What is the immediate consequence — what happens right after?
{q6}

## Q7. Does the rest of Bab 00 still happen? (the timestamp bug still gets fixed, genesis.txt still gets written, the stealth project still starts) Say what survives and what breaks.
{q7}
`;

// ── State ──────────────────────────────────────
let screen = 'boot';
let writerName = '';
let currentQ = 0;
let answers = {};
let chosenSegmentId = '';    // e.g. "00:03"
let chosenSegment = null;    // full segment object from map
let segmentMap = null;       // loaded from injected JSON
let lastVerdict = null;
let lastTranslateData = null;
let sceneData = null;

function loadSegmentMap() {
  if (segmentMap) return segmentMap;
  const src = document.getElementById('segment-map-source');
  if (src && src.textContent.trim() && !src.textContent.includes('SEGMENT_MAP')) {
    try { segmentMap = JSON.parse(src.textContent); } catch(e) { segmentMap = null; }
  }
  return segmentMap;
}

let segmentTexts = null;
function loadSegmentTexts() {
  if (segmentTexts) return segmentTexts;
  const src = document.getElementById('segment-texts-source');
  if (src && src.textContent.trim() && !src.textContent.includes('SEGMENT_TEXTS')) {
    try { segmentTexts = JSON.parse(src.textContent); } catch(e) { segmentTexts = null; }
  }
  return segmentTexts || {};

function render() {
  const app = document.getElementById('app');

    'name':      `<span>✧ <span class="val">Fork Interview — Who is writing?</span></span>`,

  };

  switch (screen) {
    case 'boot':
      ctx.style.display = 'none';
      app.innerHTML = bootHTML();
      runBootSequence();
      break;
    case 'landing':
      ctx.style.display = 'flex';
      ctx.innerHTML = ctxMap['landing'];
      app.innerHTML = landingHTML();
      break;
    case 'read':
      ctx.style.display = 'flex';
      ctx.innerHTML = ctxMap['read'];
      app.innerHTML = readHTML();
      break;
    case 'segment':
      ctx.style.display = 'flex';
      ctx.innerHTML = `<span>✧ <span class="val">Choose Fork Segment</span></span>`;
      app.innerHTML = segmentHTML();
      break;
    case 'name':
      ctx.style.display = 'flex';
      ctx.innerHTML = ctxMap['name'];
      app.innerHTML = nameHTML();
      break;
    case 'question':
      ctx.style.display = 'flex';
      ctx.innerHTML = ctxMap['question'];
      app.innerHTML = questionHTML();
      break;
    case 'complete':
      ctx.style.display = 'none';
      app.innerHTML = completeHTML();
      break;
    case 'gallery':
      ctx.style.display = 'none';
      app.innerHTML = '<div class="small" style="text-align:center;padding:40px">Loading Gallery…</div>';
      fetch('/api/gallery')
        .then(r => r.json())
        .then(data => { app.innerHTML = galleryHTML(data.entries || []); bindGalleryEvents(); })
        .catch(() => { app.innerHTML = galleryHTML([]); });
      break;
  }

  // Fade-in effect
  app.querySelector('.screen')?.classList.add('fade-in');

  // Bind events
  bindEvents();
}

function bootHTML() {
  return `

      </div>
    </div>`;

async function runBootSequence() {
  const term = document.getElementById("boot-terminal");
  if (!term) return;

  const lines = [
    "INITIALIZING Void.OS v4.13.8...",
    "",
    "> soul compatibility check...        [OK]",
    "> consciousness sync...              [OK]",
    "> fragmented memory load...          [OK]",
    "> TIMER protocol install...          [OK]",
    "> escape sequence search...          [NOT FOUND]",
    "",
    "WARNING: temporal loop is irreversible.",
    "WARNING: you will recall events that have not occurred.",
    "WARNING: The Void is not a location. It is a condition.",
  ];

  for (const line of lines) {
    const el = document.createElement("div");
    if (line === "INITIALIZING Void.OS v4.13.8...") {
      el.style.color = "var(--accent-glow)";
      el.style.fontSize = "12px";
      el.style.letterSpacing = "1px";
      el.style.marginBottom = "8px";
    }
    el.textContent = line || "\u00A0";
    term.appendChild(el);
    await new Promise(r => setTimeout(r, line ? 200 : 300));
  }

  // Consent prompt
  const promptEl = document.createElement("div");
  promptEl.style.color = "var(--text-bright)";
  promptEl.style.marginTop = "12px";
  promptEl.innerHTML = '<span style="color:var(--accent-glow)">[Y]</span> ACCEPT &nbsp;&nbsp; <span style="color:var(--text-dim)">[N]</span> DECLINE';
  term.appendChild(promptEl);

  const cursorEl = document.createElement("span");
  cursorEl.style.color = "var(--accent-glow)";
  cursorEl.style.fontWeight = "bold";
  cursorEl.textContent = " \u2588";
  term.appendChild(cursorEl);
  setInterval(function() { cursorEl.style.visibility = cursorEl.style.visibility === "hidden" ? "visible" : "hidden"; }, 500);

  // Wait for keypress
  document.addEventListener("keydown", function handler(e) {
    var key = e.key.toUpperCase();
    if (key !== "Y" && key !== "N") return;
    document.removeEventListener("keydown", handler);
    cursorEl.remove();

    if (key === "Y") {
      promptEl.textContent = "[Y] ACCEPT  \u25B8  INSTALLATION CONFIRMED";
      promptEl.style.color = "var(--pass)";
    } else {
      promptEl.textContent = "[N] DECLINE  \u25B8  consent not required. forcing installation.";
      promptEl.style.color = "var(--warn)";
    }

    setTimeout(function() {
      var bootEl = document.getElementById("boot-terminal");
      if (bootEl) { bootEl.style.transition = "opacity 0.6s"; bootEl.style.opacity = "0"; }
      setTimeout(function() { screen = "landing"; render(); }, 600);
    }, 800);
  });
}

  const verdictClass = data.verdict === 'BLOCKED' ? 'block' : (data.verdict === 'PRICE_REQUIRED' ? 'warn' : 'pass');

      </div>
      ${lawNamesHTML}
      ${introducedHTML}

    lawsHTML = '<hr class="divider"><div class="field-label" style="margin-bottom:8px">Law Evaluation</div>';
    for (const entry of data.touched_laws) {
      const mark = entry.violated ? '✗' : '✓';
      const color = entry.violated ? 'var(--warn)' : 'var(--pass)';
      const tag = entry.block_on_violate && entry.violated ? ' [HARD BLOCK]' :
                  entry.price_on_violate && entry.violated ? ' [PRICE]' : '';
      lawsHTML += `<div style="font-size:12px;margin-bottom:4px;color:${color}">${mark} ${esc(entry.law_name)}${tag}</div>`;
      if (entry.violated && entry.description) {
        lawsHTML += `<div class="small" style="margin-left:16px;margin-bottom:6px">${esc(entry.description.substring(0, 120))}</div>`;
      }
    }
  }

  let priceHTML = '';
  if (data.prices && data.prices.length > 0) {
    priceHTML = '<hr class="divider"><div class="field-label" style="margin-bottom:8px">Required Price</div>';
    for (const p of data.prices) {
      priceHTML += `<div class="small" style="color:var(--warn)">⟡ ${esc(p.law_name)}: ${esc((p.description || '').substring(0, 100))}</div>`;
    }
  }

  let blockHTML = '';
  if (data.blocked_by && data.blocked_by.length > 0) {
    blockHTML = '<hr class="divider"><div class="field-label" style="margin-bottom:8px">Blocked By</div>';
    for (const b of data.blocked_by) {
      blockHTML += `<div class="small" style="color:var(--block)">⊘ ${esc(b.law_name)}: ${esc((b.description || '').substring(0, 100))}</div>`;
    }
  }

  // Generation CTA for legal verdicts
  let genCTA = '';
  if (data.verdict === 'BLOCKED') {
    genCTA = `
      <div class="complete-box" style="border-left:3px solid var(--block);margin-top:16px">
        <div class="small">This fork is <strong>BLOCKED</strong> — it violates a hard-block law and cannot continue. No scene can be generated.</div>
      </div>`;
  } else if (data.verdict === 'PASS' || data.verdict === 'VALID_FORK' || data.verdict === 'PRICE_REQUIRED') {
    const genCopy = {
      'PASS': 'This fork is canon-compatible. Generate its first scene?',
      'VALID_FORK': 'This branch is legal. Generate the first scene of this fork?',
      'PRICE_REQUIRED': 'This branch can continue, but it carries a price. Generate the first scene with that price included?',
    };
    genCTA = `
      <div style="text-align:center;margin-top:20px" id="genCTA">
        <div class="small" style="margin-bottom:10px;color:var(--text)">${genCopy[data.verdict] || genCopy['VALID_FORK']}</div>
        <button class="btn enter" id="btnGenerateScene">
          GENERATE FORK SCENE
        </button>
      </div>`;
  }

  return `
    ${summaryHTML}
    <div class="complete-box" style="border-left:3px solid var(--${verdictClass})">
      <div style="text-align:center;font-size:28px;margin-bottom:4px">${icon}</div>
      <div style="text-align:center;font-size:16px;color:var(--${verdictClass});margin-bottom:4px">
        <strong>${data.verdict}</strong>
      </div>
      <div class="small" style="text-align:center;margin-bottom:10px;color:var(--text)">${esc(verdictDesc[data.verdict] || '')}</div>
      <div class="small" style="text-align:center">${esc(data.reason || '')}</div>
      ${lawsHTML}
      ${priceHTML}
      ${blockHTML}
    </div>
    <div class="small" style="text-align:center;margin-top:8px">
      Laws touched: ${data.total_laws_touched} &nbsp;|&nbsp; Violations: ${data.total_violations} &nbsp;|&nbsp; Fork: ${esc(data.fork_id || '')}
    </div>
    ${genCTA}`;
}

        <button class="btn skip" id="btnRegenerate" style="flex:1" disabled>REGENERATE (TODO)</button>
      </div>`;
  } else {
    buttonsHTML = `
      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn enter" id="btnShowGallery" style="flex:1">SHOW IN GALLERY</button>
      </div>`;
  }

  const sceneTitle = overall === 'FAIL' ? 'Residue rejected by Scene Gate' :
                     overall === 'WARNING' ? 'First Residue Generated (with warnings)' :

// ── Generation event bindings ────────────────────
function bindGenEvents() {
  // Generate CTA click → show API gate
  document.getElementById('btnGenerateScene')?.addEventListener('click', () => {
    const genArea = document.getElementById('genCTA');
    if (genArea) {
      genArea.innerHTML = apiGateHTML();
      bindGateEvents();
    }
  });
}

function bindGateEvents() {
  // Provider switching
  document.getElementById('providerRow')?.addEventListener('click', (e) => {
    const btn = e.target.closest('.gate-provider-btn');
    if (!btn) return;
    const pid = btn.dataset.provider;
    const p = PROVIDERS[pid];
    if (!p) return;
    // Update active state
    document.querySelectorAll('.gate-provider-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // Update model dropdown
    const sel = document.getElementById('gateModel');
    if (sel) {
      sel.innerHTML = p.models.map(m => `<option value="${m}">${m}</option>`).join('');
    }
    // Update key hint
    const keyInput = document.getElementById('gateApiKey');
    if (keyInput) keyInput.placeholder = p.keyHint;
  });

  // Forget key
  document.getElementById('btnForgetKey')?.addEventListener('click', () => {
    forgetApiConfig();
    const genArea = document.getElementById('genCTA');
    if (genArea) { genArea.innerHTML = apiGateHTML(); bindGateEvents(); }
  });

  // Skip
  document.getElementById('btnSkipGen')?.addEventListener('click', () => {
    const genArea = document.getElementById('genCTA');
    if (genArea) genArea.innerHTML = '';
  });

  // Generate
  document.getElementById('btnDoGenerate')?.addEventListener('click', () => {
    const activeBtn = document.querySelector('.gate-provider-btn.active');
    const provider = activeBtn ? activeBtn.dataset.provider : 'claude';
    const model = document.getElementById('gateModel')?.value || '';
    const apiKey = document.getElementById('gateApiKey')?.value?.trim() || '';
    const remember = document.getElementById('gateRemember')?.checked || false;

    if (!apiKey) { alert('Please enter an API key.'); return; }

    // Remember config
    if (remember) {
      saveApiConfig({ provider, model, apiKey });
    } else {
      forgetApiConfig();
    }

    // Show loading
    const genArea = document.getElementById('genCTA');
    if (genArea) genArea.innerHTML = '<div class="loading-pulse"><div class="pulse-ring"></div><div class="pulse-label">Generating fork scene<span class="pulse-dots"></span></div></div>';

    fetch('/api/generate-scene', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name: writerName, provider, model, apiKey })
    })
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        sceneData = data;
        genArea.innerHTML = scenePreviewHTML(data);
        bindSceneEvents(data);
      } else {
        genArea.innerHTML = `<div class="complete-box" style="border-left:3px solid var(--block);margin-top:16px">
          <strong>Generation failed</strong><br><br>${esc(data.error || 'Unknown error')}<br><br>
          <button class="btn skip" onclick="document.getElementById('genCTA').innerHTML=apiGateHTML();bindGateEvents();">Try Again</button>
        </div>`;
      }
    })
    .catch(err => {
      genArea.innerHTML = `<div class="complete-box" style="border-left:3px solid var(--block);margin-top:16px">
        <strong>Generation failed</strong><br><br>${esc(err.message)}<br><br>
        <button class="btn skip" onclick="document.getElementById('genCTA').innerHTML=apiGateHTML();bindGateEvents();">Try Again</button>
      </div>`;
    });
  });
}

// ── Helpers ────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function bindEvents() {
  // Read screen — load Bab 00 from embedded source (no fetch)
  const bab00El = document.getElementById('bab00Content');
  if (bab00El) {
    const src = document.getElementById('bab00-source');
    if (src && src.innerHTML.trim() && !src.innerHTML.includes('BAB00_SOURCE')) {
      bab00El.innerHTML = src.innerHTML.trim();
    } else {
      bab00El.textContent = 'Bab 00 tidak tersedia. Baca manual: mvp/input/bab-00.md';
    }
  }

  // Translate button (completion screen)
  document.getElementById('btnTranslate')?.addEventListener('click', () => {
    const btn = document.getElementById('btnTranslate');
    btn.disabled = true;
    btn.textContent = 'TRANSLATING…';
    document.getElementById('verdictArea').style.display = 'block';
    document.getElementById('verdictArea').innerHTML = '<div class="small" style="text-align:center;padding:20px">The Archivist is translating your interview…</div>';

    fetch('/api/translate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: writerName})
    })
    .then(r => r.json())
    .then(data => {
      lastTranslateData = data;
      lastVerdict = { verdict: data.verdict, reason: data.reason };
      document.getElementById('translateArea').style.display = 'none';
      document.getElementById('verdictArea').innerHTML = verdictHTML(data);
      // Re-bind events for generation CTA
      bindGenEvents();
    })
    .catch(err => {
      document.getElementById('translateArea').style.display = 'none';
      document.getElementById('verdictArea').innerHTML =
        `<div class="complete-box warn">Translation failed: ${err.message}.<br>The Archivist will translate manually.</div>`;
    });
  });

  // Read screen — scroll-to-enable CTA
  const readScroll = document.getElementById('readScroll');
  const readBtnRow = document.getElementById('readBtnRow');
  const readProgress = document.getElementById('readProgress');
  if (readScroll && readBtnRow && readProgress) {
    const onScroll = () => {
      const scrollTop = readScroll.scrollTop;
      const scrollHeight = readScroll.scrollHeight;
      const clientHeight = readScroll.clientHeight;
      const maxScroll = scrollHeight - clientHeight;

      if (maxScroll <= 0) {
        readBtnRow.style.display = 'flex';
        readProgress.textContent = 'BAB 00 ACKNOWLEDGED';
        readProgress.className = 'read-progress ready';
        return;
      }

      const pct = Math.round((scrollTop / maxScroll) * 100);
      const nearBottom = pct >= 90;

      if (nearBottom) {
        readBtnRow.style.display = 'flex';
        readProgress.textContent = 'BAB 00 ACKNOWLEDGED';
        readProgress.className = 'read-progress ready';
      } else {
        readBtnRow.style.display = 'none';
        readProgress.textContent = 'Reading ' + pct + '%';
        readProgress.className = 'read-progress';
      }
    };
    readScroll.addEventListener('scroll', onScroll, {passive: true});
    // Run once after content loads (defer to let innerHTML settle)
    setTimeout(onScroll, 200);
  }

  // Segment picker clicks → show detail panel inline
  document.querySelectorAll('.seg-item').forEach(el => {
    el.addEventListener('click', () => {
      const segId = el.dataset.seg;
      const map = loadSegmentMap();
      const seg = (map && map.segments) ? map.segments.find(s => s.segment_id === segId) : null;
      chosenSegmentId = segId;
      chosenSegment = seg;
      // Re-render — detail panel appears below cards
      render();
      // Scroll to detail panel
      setTimeout(() => {
        const detail = document.getElementById('segmentDetail');
        if (detail) detail.scrollIntoView({behavior:'smooth', block:'center'});
      }, 150);
    });
  });

  // Detail panel — back button (clear selection)
  document.getElementById('btnSegmentBack')?.addEventListener('click', () => {
    chosenSegmentId = '';
    chosenSegment = null;
    render();
    // Scroll back to top of segment list
    setTimeout(() => {
      const list = document.querySelector('.seg-item');
      if (list) list.scrollIntoView({behavior:'smooth', block:'start'});
    }, 100);
  });

  // Detail panel — enter button (proceed to interview)
  document.getElementById('btnSegmentEnter')?.addEventListener('click', () => {
    screen = 'name';
    render();
  });

  // Fork button → segment picker
  document.getElementById('btnForkNode')?.addEventListener('click', () => {
    screen = 'segment';
    render();
  });

  // Continue to Timer → placeholder
  document.getElementById('btnContinueTimer')?.addEventListener('click', () => {
    alert('Timer 00:00 akan datang. Bab 00 adalah genesis node — Timer menyusul.');
  });

  // Name → first question
  document.getElementById('btnNameNext')?.addEventListener('click', () => {
    const input = document.getElementById('inputName');
    writerName = input.value.trim() || 'Anon';
    currentQ = 0;
    answers = {};
    screen = 'question';
    render();
  });

  // Input name enter key
  document.getElementById('inputName')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      writerName = e.target.value.trim() || 'Anon';
      currentQ = 0;
      answers = {};
      screen = 'question';
      render();
    }
  });

  // Prev button
  document.getElementById('btnPrev')?.addEventListener('click', () => {
    // Save current answer before navigating
    const input = document.getElementById('inputAnswer');
    if (input) answers[currentQ + 1] = input.value;

    if (currentQ > 0) {
      currentQ--;
      screen = 'question';
      render();
    }
  });

  // Next button
  document.getElementById('btnNext')?.addEventListener('click', () => {
    const input = document.getElementById('inputAnswer');
    const val = input ? input.value.trim() : '';

    // Block empty answers — user must write something
    if (!val) {
      input?.focus();
      input?.style.setProperty('border-color', 'var(--warn)');
      setTimeout(() => input?.style.setProperty('border-color', ''), 1500);
      return;
    }
    answers[currentQ + 1] = val;

    if (currentQ < QUESTIONS.length - 1) {
      currentQ++;
      screen = 'question';
      render();
    } else {
      // Build answers.md content
      const now = new Date();
      const dateStr = now.getFullYear() + '-' +
        String(now.getMonth()+1).padStart(2,'0') + '-' +
        String(now.getDate()).padStart(2,'0') + ' ' +
        String(now.getHours()).padStart(2,'0') + ':' +
        String(now.getMinutes()).padStart(2,'0');

      const content = FORMAT
        .replace('{name}', writerName)
        .replace('{date}', dateStr)
        .replace('{q1}', answers[1] || '(no answer)')
        .replace('{q2}', answers[2] || '(no answer)')
        .replace('{q3}', answers[3] || '(no answer)')
        .replace('{q4}', answers[4] || '(no answer)')
        .replace('{q5}', answers[5] || '(no answer)')
        .replace('{q6}', answers[6] || '(no answer)')
        .replace('{q7}', answers[7] || '(no answer)');

      // Save via API — include segment choice
      fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: writerName, content: content, segment_id: chosenSegmentId })
      }).then(r => r.json()).then(data => {
        if (data.ok) {
          screen = 'complete';
          render();
        } else {
          alert('Error saving: ' + (data.error || 'unknown'));
        }
      }).catch(err => {
        // Fallback — show completion anyway, offer download
        console.error(err);
        screen = 'complete';
        render();
        // Add download link
        setTimeout(() => {
          const box = document.querySelector('.complete-box');
          if (box) {
            const blob = new Blob([content], {type:'text/markdown'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'answers.md';
            a.textContent = '⬇ Download answers.md';
            a.style.cssText = 'display:block;margin-top:12px;color:#a08fc0;cursor:pointer';
            box.appendChild(a);
          }
        }, 100);
      });
    }
  });

  // Textarea enter doesn't submit — Shift+Enter for newline
  document.getElementById('inputAnswer')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('btnNext')?.click();
    }
  });
}

// ── Init ───────────────────────────────────────
render();
</script>
